# Docker services for mebsuta integration tests
# Usage: docker compose -f scripts/docker-compose.yml up -d --wait

services:
  mysql:
    image: mysql:8.4
    container_name: mebsuta-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: logs
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest"]
      interval: 5s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:18-alpine
    container_name: mebsuta-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: logs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d logs"]
      interval: 5s
      timeout: 5s
      retries: 10
