name: Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      repo: ${{ steps.filter.outputs.repo }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - '**/go.mod'
              - '**/go.sum'
            repo:
              - '.github/**'
              - 'README.md'

  go:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.repo == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            database/go.sum
            metrics/go.sum
            syslog/go.sum
      - run: go work sync
      - run: go test -race -count=1 ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -s -l .)"

  go-vulncheck:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.repo == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            database/go.sum
            metrics/go.sum
            syslog/go.sum
      - run: go work sync
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  status:
    runs-on: ubuntu-latest
    needs: [changes, go, go-vulncheck]
    if: always()
    env:
      GO_SEL: ${{ needs.changes.outputs.go }}
      REPO_SEL: ${{ needs.changes.outputs.repo }}
      GO_RESULT: ${{ needs.go.result }}
      GO_VULN_RESULT: ${{ needs.go-vulncheck.result }}
    steps:
      - name: Report selected jobs
        run: |
          echo "## Dev CI Status Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Selected | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          if [ "$GO_SEL" = 'true' ] || [ "$REPO_SEL" = 'true' ]; then sel=yes; else sel=no; fi
          echo "| go | $sel | $GO_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| go-vulncheck | $sel | $GO_VULN_RESULT |" >> "$GITHUB_STEP_SUMMARY"
      - name: Fail if any selected job failed
        run: |
          failed=0
          if [ "$GO_SEL" = 'true' ] || [ "$REPO_SEL" = 'true' ]; then
            [ "$GO_RESULT" = 'success' ] || { echo "::error::go job failed or was cancelled"; failed=1; }
            [ "$GO_VULN_RESULT" = 'success' ] || { echo "::error::go-vulncheck job failed or was cancelled"; failed=1; }
          fi
          exit "$failed"
