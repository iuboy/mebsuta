name: Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "以下文件需要格式化:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run unit tests
        run: go test -v -race ./...

      - name: Run integration tests
        run: go test -v -race -tags=integration ./integration/...
